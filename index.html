<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tap & Win</title>

<meta name="theme-color" content="#111111">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

</head>

<body>

<!-- HERO -->

<section id="hero">

<div class="hero-overlay"></div>

<img
class="hero-image"
src="images/hero.jpg"
alt="Barbershop">

<div class="hero-content">

<img
src="images/logo.png"
class="logo"
alt="Logo">

<h1>TAP & WIN</h1>

<p>

Tap your phone...

Spin the wheel...

Win amazing prizes!

</p>

<button id="startBtn">

START

</button>

</div>

</section>

<!-- GAME -->

<section id="game" class="hidden">

<div class="top">

<img
src="images/logo.png"
class="small-logo"
alt="Logo">

<h2>

Spin The Wheel

</h2>

<p>

Good Luck!

</p>

</div>

<div class="wheel-box">

<div class="pointer"></div>

<canvas
id="wheelCanvas"
width="500"
height="500">
</canvas>

</div>

<button id="spinBtn">

SPIN NOW

</button>

<div
id="resultBox"
class="hidden">

<h2 id="resultTitle">

Congratulations!

</h2>

<h3 id="resultPrize">

FREE HAIRCUT

</h3>

<button id="againBtn">

PLAY AGAIN

</button>

</div>

</section>

<footer>

Powered by

<strong>

Tap & Win

</strong>

</footer>

<!-- AUDIO -->

<audio id="spinSound">

<source src="sounds/spin.mp3" type="audio/mpeg">

</audio>

<audio id="winSound">

<source src="sounds/win.mp3" type="audio/mpeg">

</audio>

<script src="script.js"></script>

</body>

</html>
